<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Čeština">
<meta name="theme-color" content="#ffffff">
<title>Čeština — Мій кабінет репетитора</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f7f6f2;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #999891;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --accent: #3B6D11;
    --accent-bg: #EAF3DE;
    --accent-text: #27500A;
    --danger: #A32D2D;
    --danger-bg: #FCEBEB;
    --warn: #854F0B;
    --warn-bg: #FAEEDA;
    --info: #185FA5;
    --info-bg: #E6F1FB;
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2a;
      --text: #f0ede8;
      --text2: #a8a79f;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --accent: #97C459;
      --accent-bg: #173404;
      --accent-text: #C0DD97;
      --danger: #F09595;
      --danger-bg: #501313;
      --warn: #EF9F27;
      --warn-bg: #412402;
      --info: #85B7EB;
      --info-bg: #042C53;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 0.5px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 4px; font-size: 10px; color: var(--text3);
    background: none; border: none; cursor: pointer; transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .page { display: none; padding: 16px 16px 0; }
  .page.active { display: block; }
  .card {
    background: var(--bg);
    border-radius: var(--r-lg);
    border: 0.5px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text3); margin: 20px 0 8px; font-weight: 500;
  }
  input[type=text], input[type=number], select, textarea {
    width: 100%; padding: 10px 12px; border-radius: var(--r-md);
    border: 0.5px solid var(--border2); background: var(--bg2);
    color: var(--text); font-size: 15px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  button.primary {
    background: var(--accent); color: #fff; border: none;
    padding: 11px 20px; border-radius: var(--r-md); font-size: 15px;
    font-family: inherit; cursor: pointer; font-weight: 500; width: 100%;
    transition: opacity 0.15s;
  }
  button.primary:active { opacity: 0.8; }
  button.secondary {
    background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2);
    padding: 9px 16px; border-radius: var(--r-md); font-size: 14px;
    font-family: inherit; cursor: pointer; transition: background 0.15s;
  }
  button.secondary:active { background: var(--bg3); }
  button.ghost {
    background: none; border: none; color: var(--text2); font-size: 14px;
    font-family: inherit; cursor: pointer; padding: 4px 0;
  }
  button.danger-btn {
    background: var(--danger-bg); color: var(--danger); border: none;
    padding: 9px 16px; border-radius: var(--r-md); font-size: 14px;
    font-family: inherit; cursor: pointer;
  }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
  }
  .badge-green { background: var(--accent-bg); color: var(--accent-text); }
  .badge-blue { background: var(--info-bg); color: var(--info); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-red { background: var(--danger-bg); color: var(--danger); }
  .badge-gray { background: var(--bg3); color: var(--text2); }
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .divider { height: 0.5px; background: var(--border); margin: 12px 0; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: var(--r-xl) var(--r-xl) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 500; margin-bottom: 16px; }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .pill.selected { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .student-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 0.5px solid var(--border);
  }
  .student-row:last-child { border-bottom: none; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; flex-shrink: 0;
    background: var(--accent-bg); color: var(--accent-text);
  }
  .lesson-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 0.5px solid var(--border);
  }
  .lesson-row:last-child { border-bottom: none; }
  .lesson-time {
    font-size: 13px; color: var(--text2); min-width: 48px;
    flex-shrink: 0; padding-top: 2px;
  }
  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
  }
  .check-row:last-child { border-bottom: none; }
  .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid var(--border2); background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all 0.15s;
  }
  .checkbox.checked {
    background: var(--accent); border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: ''; width: 10px; height: 6px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px); display: block;
  }
  .notion-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; padding: 5px 12px; border-radius: var(--r-md);
    border: 0.5px solid var(--border2); background: var(--bg2);
    color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .notion-btn.done { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--bg3); overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--r-md); padding: 3px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 7px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .tab.active { background: var(--bg); color: var(--text); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border-radius: var(--r-md); padding: 14px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }
  select option { background: var(--bg); }
</style>
</head>
<body>

<div class="header">
  <h1>Čeština 🇨🇿</h1>
  <p id="header-date"></p>
</div>

<!-- PAGES -->
<div id="page-schedule" class="page active">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Уроків сьогодні</div>
      <div class="stat-value" id="stat-today">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Цього тижня</div>
      <div class="stat-value" id="stat-week">0</div>
    </div>
  </div>
  <div class="section-title">Сьогодні</div>
  <div id="today-lessons"></div>
  <div class="section-title">Найближчі уроки</div>
  <div id="upcoming-lessons"></div>
  <div style="height: 16px;"></div>
  <button class="primary" onclick="openModal('modal-add-lesson')">+ Запланувати урок</button>
  <div style="height: 16px;"></div>
</div>

<div id="page-students" class="page">
  <div id="students-list"></div>
  <div style="height: 16px;"></div>
  <button class="primary" onclick="openModal('modal-add-student')">+ Додати учня</button>
  <div style="height: 16px;"></div>
</div>

<div id="page-topics" class="page">
  <div class="tabs">
    <div class="tab active" onclick="switchTopicLevel('A1')">A1</div>
    <div class="tab" onclick="switchTopicLevel('A2')">A2</div>
    <div class="tab" onclick="switchTopicLevel('B1')">B1</div>
    <div class="tab" onclick="switchTopicLevel('B2')">B2</div>
  </div>
  <div id="topics-list"></div>
  <div style="height: 16px;"></div>
  <div class="input-row">
    <input type="text" id="new-topic-input" placeholder="Нова тема...">
    <button class="secondary" onclick="addTopic()">+</button>
  </div>
  <div style="height: 16px;"></div>
</div>

<div id="page-payments" class="page">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Заплачено цього місяця</div>
      <div class="stat-value" id="stat-paid">0 ₴</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Борг</div>
      <div class="stat-value" style="color: var(--danger)" id="stat-debt">0 ₴</div>
    </div>
  </div>
  <div id="payments-list"></div>
  <div style="height: 16px;"></div>
  <button class="primary" onclick="openModal('modal-add-payment')">+ Додати оплату</button>
  <div style="height: 16px;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('schedule', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    Розклад
  </button>
  <button class="nav-btn" onclick="showPage('students', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
    Учні
  </button>
  <button class="nav-btn" onclick="showPage('topics', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Теми
  </button>
  <button class="nav-btn" onclick="showPage('payments', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    Оплати
  </button>
</nav>

<!-- MODALS -->
<div class="modal-overlay" id="modal-add-student">
  <div class="modal">
    <div class="modal-title">Новий учень</div>
    <div class="form-group">
      <label class="form-label">Ім'я</label>
      <input type="text" id="s-name" placeholder="Ім'я учня">
    </div>
    <div class="form-group">
      <label class="form-label">Рівень</label>
      <div class="pill-row" id="s-level-pills">
        <div class="pill selected" onclick="selectPill(this,'s-level')">A1</div>
        <div class="pill" onclick="selectPill(this,'s-level')">A2</div>
        <div class="pill" onclick="selectPill(this,'s-level')">B1</div>
        <div class="pill" onclick="selectPill(this,'s-level')">B2</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Вартість уроку (₴)</label>
      <input type="number" id="s-price" placeholder="500">
    </div>
    <div class="form-group">
      <label class="form-label">Тип розкладу</label>
      <div class="pill-row" id="s-schedule-pills">
        <div class="pill selected" onclick="selectPill(this,'s-schedule')">Регулярний</div>
        <div class="pill" onclick="selectPill(this,'s-schedule')">Гнучкий</div>
      </div>
    </div>
    <div id="s-regular-days" class="form-group">
      <label class="form-label">Дні тижня</label>
      <div class="pill-row" id="s-days-pills">
        <div class="pill" onclick="togglePill(this)">Пн</div>
        <div class="pill" onclick="togglePill(this)">Вт</div>
        <div class="pill" onclick="togglePill(this)">Ср</div>
        <div class="pill" onclick="togglePill(this)">Чт</div>
        <div class="pill" onclick="togglePill(this)">Пт</div>
        <div class="pill" onclick="togglePill(this)">Сб</div>
        <div class="pill" onclick="togglePill(this)">Нд</div>
      </div>
    </div>
    <div id="s-regular-time" class="form-group">
      <label class="form-label">Час</label>
      <input type="text" id="s-time" placeholder="10:00">
    </div>
    <div class="form-group">
      <label class="form-label">Тривалість (хв)</label>
      <div class="pill-row" id="s-dur-pills">
        <div class="pill" onclick="selectPill(this,'s-dur')">45</div>
        <div class="pill selected" onclick="selectPill(this,'s-dur')">60</div>
        <div class="pill" onclick="selectPill(this,'s-dur')">90</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Нотатки</label>
      <textarea id="s-notes" placeholder="Цілі, особливості..."></textarea>
    </div>
    <button class="primary" onclick="saveStudent()">Зберегти</button>
    <button class="ghost" style="width:100%;text-align:center;margin-top:12px" onclick="closeModal('modal-add-student')">Скасувати</button>
  </div>
</div>

<div class="modal-overlay" id="modal-add-lesson">
  <div class="modal">
    <div class="modal-title">Новий урок</div>
    <div class="form-group">
      <label class="form-label">Учень</label>
      <select id="l-student"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Дата</label>
      <input type="text" id="l-date" placeholder="дд.мм.рррр">
    </div>
    <div class="form-group">
      <label class="form-label">Час початку</label>
      <input type="text" id="l-time" placeholder="10:00">
    </div>
    <div class="form-group">
      <label class="form-label">Тривалість (хв)</label>
      <div class="pill-row" id="l-dur-pills">
        <div class="pill" onclick="selectPill(this,'l-dur')">45</div>
        <div class="pill selected" onclick="selectPill(this,'l-dur')">60</div>
        <div class="pill" onclick="selectPill(this,'l-dur')">90</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Тема уроку (необов'язково)</label>
      <input type="text" id="l-topic" placeholder="Наприклад: Числівники A1">
    </div>
    <button class="primary" onclick="saveLesson()">Зберегти</button>
    <button class="ghost" style="width:100%;text-align:center;margin-top:12px" onclick="closeModal('modal-add-lesson')">Скасувати</button>
  </div>
</div>

<div class="modal-overlay" id="modal-add-payment">
  <div class="modal">
    <div class="modal-title">Нова оплата</div>
    <div class="form-group">
      <label class="form-label">Учень</label>
      <select id="p-student"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Тип</label>
      <div class="pill-row" id="p-type-pills">
        <div class="pill selected" onclick="selectPill(this,'p-type')">Разовий</div>
        <div class="pill" onclick="selectPill(this,'p-type')">Абонемент</div>
      </div>
    </div>
    <div id="p-subscription-group" style="display:none" class="form-group">
      <label class="form-label">Кількість уроків в абонементі</label>
      <input type="number" id="p-lessons-count" placeholder="8">
    </div>
    <div class="form-group">
      <label class="form-label">Сума (₴)</label>
      <input type="number" id="p-amount" placeholder="500">
    </div>
    <div class="form-group">
      <label class="form-label">Дата</label>
      <input type="text" id="p-date" placeholder="дд.мм.рррр">
    </div>
    <div class="form-group">
      <label class="form-label">Статус</label>
      <div class="pill-row" id="p-status-pills">
        <div class="pill selected" onclick="selectPill(this,'p-status')">Оплачено</div>
        <div class="pill" onclick="selectPill(this,'p-status')">Очікує</div>
      </div>
    </div>
    <button class="primary" onclick="savePayment()">Зберегти</button>
    <button class="ghost" style="width:100%;text-align:center;margin-top:12px" onclick="closeModal('modal-add-payment')">Скасувати</button>
  </div>
</div>

<div class="modal-overlay" id="modal-lesson-detail">
  <div class="modal">
    <div id="lesson-detail-content"></div>
    <button class="ghost" style="width:100%;text-align:center;margin-top:16px" onclick="closeModal('modal-lesson-detail')">Закрити</button>
  </div>
</div>

<div class="modal-overlay" id="modal-student-detail">
  <div class="modal">
    <div id="student-detail-content"></div>
    <button class="ghost" style="width:100%;text-align:center;margin-top:16px" onclick="closeModal('modal-student-detail')">Закрити</button>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let state = {
  students: [],
  lessons: [],
  payments: [],
  topics: { A1: [], A2: [], B1: [], B2: [] }
};
let currentTopicLevel = 'A1';

function save() { localStorage.setItem('czech_tutor_v1', JSON.stringify(state)); }
function load() {
  const d = localStorage.getItem('czech_tutor_v1');
  if (d) state = JSON.parse(d);
}
load();

// ── UTILS ──────────────────────────────────────────────────
function today() {
  const d = new Date();
  return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}
function getStudent(id) { return state.students.find(s => s.id === id); }
function dateToNum(d) {
  if (!d) return 0;
  const parts = d.split('.');
  if (parts.length < 3) return 0;
  return parseInt(parts[2]+parts[1]+parts[0]);
}
function todayNum() { return dateToNum(today()); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── MODALS ─────────────────────────────────────────────────
function openModal(id) {
  if (id === 'modal-add-lesson' || id === 'modal-add-payment') fillStudentSelect(id);
  if (id === 'modal-add-lesson') {
    document.getElementById('l-date').value = today();
  }
  if (id === 'modal-add-payment') {
    document.getElementById('p-date').value = today();
    document.getElementById('p-subscription-group').style.display = 'none';
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function fillStudentSelect(modalId) {
  const sid = modalId === 'modal-add-lesson' ? 'l-student' : 'p-student';
  const sel = document.getElementById(sid);
  sel.innerHTML = state.students.length
    ? state.students.map(s => `<option value="${s.id}">${s.name} (${s.level})</option>`).join('')
    : '<option value="">— немає учнів —</option>';
}

// ── PILLS ─────────────────────────────────────────────────
function selectPill(el, group) {
  el.closest('.pill-row').querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  if (group === 's-schedule') {
    const reg = el.textContent === 'Регулярний';
    document.getElementById('s-regular-days').style.display = reg ? '' : 'none';
    document.getElementById('s-regular-time').style.display = reg ? '' : 'none';
  }
  if (group === 'p-type') {
    document.getElementById('p-subscription-group').style.display =
      el.textContent === 'Абонемент' ? '' : 'none';
  }
}
function togglePill(el) { el.classList.toggle('selected'); }
function getPill(rowId) {
  const el = document.getElementById(rowId)?.querySelector('.selected');
  return el ? el.textContent.trim() : null;
}
function getMultiPill(rowId) {
  return [...document.getElementById(rowId).querySelectorAll('.pill.selected')].map(p => p.textContent.trim());
}

// ── NAVIGATION ────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'schedule') renderSchedule();
  if (name === 'students') renderStudents();
  if (name === 'topics') renderTopics();
  if (name === 'payments') renderPayments();
}

// ── SCHEDULE ──────────────────────────────────────────────
function renderSchedule() {
  const tod = today();
  const todayN = dateToNum(tod);

  const todayLessons = state.lessons.filter(l => l.date === tod).sort((a,b) => a.time.localeCompare(b.time));
  const upcoming = state.lessons.filter(l => dateToNum(l.date) > todayN).sort((a,b) => dateToNum(a.date)-dateToNum(b.date)).slice(0,5);

  document.getElementById('stat-today').textContent = todayLessons.length;

  const weekN = todayN + 7;
  const wk = state.lessons.filter(l => {
    const n = dateToNum(l.date);
    return n >= todayN && n <= weekN;
  }).length;
  document.getElementById('stat-week').textContent = wk;

  const todayEl = document.getElementById('today-lessons');
  if (todayLessons.length === 0) {
    todayEl.innerHTML = '<div class="empty">Уроків сьогодні немає</div>';
  } else {
    todayEl.innerHTML = '<div class="card">' + todayLessons.map(l => lessonRow(l)).join('') + '</div>';
  }

  const upEl = document.getElementById('upcoming-lessons');
  if (upcoming.length === 0) {
    upEl.innerHTML = '<div class="empty">Немає запланованих уроків</div>';
  } else {
    upEl.innerHTML = '<div class="card">' + upcoming.map(l => lessonRow(l)).join('') + '</div>';
  }
}

function lessonRow(l) {
  const st = getStudent(l.studentId);
  const name = st ? st.name : '?';
  const notionDone = l.notionDone ? 'done' : '';
  const doneTxt = l.notionDone ? '✓ Notion' : '📎 Notion';
  return `<div class="lesson-row" onclick="openLessonDetail('${l.id}')">
    <div class="lesson-time">${l.time || '--:--'}<br><span style="font-size:11px;color:var(--text3)">${l.date||''}</span></div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:500;font-size:15px">${name}</div>
      <div style="font-size:13px;color:var(--text2)">${l.topic || 'Без теми'} · ${l.duration||60} хв</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <span class="badge ${l.done ? 'badge-green' : 'badge-gray'}">${l.done ? 'Проведено' : 'Заплановано'}</span>
      <span class="notion-btn ${notionDone}" onclick="event.stopPropagation();toggleNotion('${l.id}')">${doneTxt}</span>
    </div>
  </div>`;
}

function openLessonDetail(id) {
  const l = state.lessons.find(x => x.id === id);
  if (!l) return;
  const st = getStudent(l.studentId);
  const name = st ? st.name : '?';
  document.getElementById('lesson-detail-content').innerHTML = `
    <div class="modal-title">Урок: ${name}</div>
    <div class="card">
      <div class="row-between" style="margin-bottom:8px">
        <span style="color:var(--text2);font-size:13px">Дата і час</span>
        <span style="font-weight:500">${l.date} ${l.time}</span>
      </div>
      <div class="row-between" style="margin-bottom:8px">
        <span style="color:var(--text2);font-size:13px">Тривалість</span>
        <span>${l.duration||60} хв</span>
      </div>
      <div class="row-between" style="margin-bottom:8px">
        <span style="color:var(--text2);font-size:13px">Тема</span>
        <span>${l.topic||'—'}</span>
      </div>
      <div class="row-between">
        <span style="color:var(--text2);font-size:13px">Матеріал у Notion</span>
        <span class="notion-btn ${l.notionDone?'done':''}" onclick="toggleNotion('${l.id}');rerenderDetail('${l.id}')">${l.notionDone?'✓ Завантажено':'📎 Завантажити'}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="secondary" style="flex:1" onclick="toggleLessonDone('${l.id}');rerenderDetail('${l.id}')">${l.done?'↩ Відмінити':'✓ Проведено'}</button>
      <button class="danger-btn" onclick="deleteLesson('${l.id}')">Видалити</button>
    </div>`;
  openModal('modal-lesson-detail');
}
function rerenderDetail(id) {
  closeModal('modal-lesson-detail');
  renderSchedule();
  setTimeout(() => openLessonDetail(id), 50);
}
function toggleNotion(id) {
  const l = state.lessons.find(x => x.id === id);
  if (l) { l.notionDone = !l.notionDone; save(); renderSchedule(); }
}
function toggleLessonDone(id) {
  const l = state.lessons.find(x => x.id === id);
  if (l) { l.done = !l.done; save(); renderSchedule(); }
}
function deleteLesson(id) {
  state.lessons = state.lessons.filter(x => x.id !== id);
  save(); closeModal('modal-lesson-detail'); renderSchedule();
}

function saveLesson() {
  const sid = document.getElementById('l-student').value;
  const date = document.getElementById('l-date').value.trim();
  const time = document.getElementById('l-time').value.trim();
  const topic = document.getElementById('l-topic').value.trim();
  const dur = getPill('l-dur-pills') || '60';
  if (!sid || !date) { alert('Вибери учня і вкажи дату'); return; }
  state.lessons.push({ id: uid(), studentId: sid, date, time, topic, duration: parseInt(dur), done: false, notionDone: false });
  save(); closeModal('modal-add-lesson'); renderSchedule();
  document.getElementById('l-date').value = '';
  document.getElementById('l-time').value = '';
  document.getElementById('l-topic').value = '';
}

// ── STUDENTS ─────────────────────────────────────────────
function renderStudents() {
  const el = document.getElementById('students-list');
  if (state.students.length === 0) {
    el.innerHTML = '<div class="empty">Учнів ще немає.<br>Додай першого!</div>';
    return;
  }
  el.innerHTML = state.students.map(s => {
    const paidTotal = state.payments.filter(p => p.studentId === s.id && p.status === 'Оплачено').reduce((a,p) => a + (p.amount||0), 0);
    const debtTotal = state.payments.filter(p => p.studentId === s.id && p.status === 'Очікує').reduce((a,p) => a + (p.amount||0), 0);
    const topics = state.topics[s.level] || [];
    const done = topics.filter(t => (t.doneBy||[]).includes(s.id)).length;
    const pct = topics.length ? Math.round(done/topics.length*100) : 0;
    const sub = state.payments.find(p => p.studentId === s.id && p.type === 'Абонемент' && p.status === 'Оплачено' && p.lessonsLeft > 0);
    return `<div class="card" onclick="openStudentDetail('${s.id}')">
      <div class="student-row" style="border:none;padding:0">
        <div class="avatar">${initials(s.name)}</div>
        <div style="flex:1">
          <div style="font-weight:500;font-size:16px">${s.name}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">
            <span class="badge badge-green">${s.level}</span>
            ${sub ? `<span class="badge badge-blue" style="margin-left:4px">Абонемент: ${sub.lessonsLeft} ур.</span>` : ''}
            ${debtTotal > 0 ? `<span class="badge badge-red" style="margin-left:4px">Борг: ${debtTotal}₴</span>` : ''}
          </div>
          <div style="margin-top:8px">
            <div style="font-size:12px;color:var(--text3);margin-bottom:3px">Теми ${s.level}: ${done}/${topics.length}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openStudentDetail(id) {
  const s = getStudent(id);
  if (!s) return;
  const lessons = state.lessons.filter(l => l.studentId === id).sort((a,b) => dateToNum(b.date)-dateToNum(a.date));
  const topics = state.topics[s.level] || [];
  const nextTopic = topics.find(t => !(t.doneBy||[]).includes(id));
  const payments = state.payments.filter(p => p.studentId === id);
  const debtTotal = payments.filter(p => p.status === 'Очікує').reduce((a,p) => a + (p.amount||0), 0);
  const sub = payments.find(p => p.type === 'Абонемент' && p.status === 'Оплачено' && p.lessonsLeft > 0);
  document.getElementById('student-detail-content').innerHTML = `
    <div class="row-between" style="margin-bottom:16px">
      <div class="row" style="gap:12px">
        <div class="avatar" style="width:48px;height:48px;font-size:16px">${initials(s.name)}</div>
        <div>
          <div style="font-size:17px;font-weight:500">${s.name}</div>
          <span class="badge badge-green">${s.level}</span>
        </div>
      </div>
      <button class="danger-btn" style="font-size:13px;padding:6px 12px" onclick="deleteStudent('${id}')">Видалити</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Вартість уроку</div><div class="stat-value">${s.price||'—'}₴</div></div>
      <div class="stat-card"><div class="stat-label">Борг</div><div class="stat-value" style="color:var(--danger)">${debtTotal}₴</div></div>
    </div>
    ${sub ? `<div class="card" style="margin-bottom:12px"><div class="row-between"><span style="font-size:14px">Абонемент</span><span class="badge badge-blue">${sub.lessonsLeft} урок(ів) лишилось</span></div></div>` : ''}
    ${nextTopic ? `<div class="card" style="background:var(--accent-bg);border-color:var(--accent);margin-bottom:12px">
      <div style="font-size:12px;color:var(--accent-text);margin-bottom:4px;font-weight:500">Наступна тема (${s.level})</div>
      <div style="font-weight:500;color:var(--accent-text)">${nextTopic.name}</div>
    </div>` : ''}
    ${s.notes ? `<div class="card" style="margin-bottom:12px"><div class="card-title">Нотатки</div>${s.notes}</div>` : ''}
    <div class="section-title" style="margin-top:0">Останні уроки</div>
    <div class="card">
      ${lessons.length ? lessons.slice(0,5).map(l => `
        <div class="check-row">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500">${l.date} ${l.time}</div>
            <div style="font-size:13px;color:var(--text2)">${l.topic||'Без теми'}</div>
          </div>
          <span class="badge ${l.done?'badge-green':'badge-gray'}">${l.done?'Проведено':'Заплановано'}</span>
        </div>`).join('') : '<div style="color:var(--text3);font-size:14px;padding:8px 0">Уроків ще не було</div>'}
    </div>`;
  openModal('modal-student-detail');
}

function deleteStudent(id) {
  if (!confirm('Видалити учня?')) return;
  state.students = state.students.filter(s => s.id !== id);
  state.lessons = state.lessons.filter(l => l.studentId !== id);
  state.payments = state.payments.filter(p => p.studentId !== id);
  save(); closeModal('modal-student-detail'); renderStudents();
}

function saveStudent() {
  const name = document.getElementById('s-name').value.trim();
  const level = getPill('s-level-pills') || 'A1';
  const price = parseInt(document.getElementById('s-price').value) || 0;
  const schedule = getPill('s-schedule-pills') || 'Регулярний';
  const days = getMultiPill('s-days-pills');
  const time = document.getElementById('s-time').value.trim();
  const duration = parseInt(getPill('s-dur-pills')) || 60;
  const notes = document.getElementById('s-notes').value.trim();
  if (!name) { alert('Введи ім\'я'); return; }
  state.students.push({ id: uid(), name, level, price, schedule, days, time, duration, notes });
  save(); closeModal('modal-add-student'); renderStudents();
  document.getElementById('s-name').value = '';
  document.getElementById('s-price').value = '';
  document.getElementById('s-time').value = '';
  document.getElementById('s-notes').value = '';
}

// ── TOPICS ────────────────────────────────────────────────
function switchTopicLevel(level) {
  currentTopicLevel = level;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['A1','A2','B1','B2'][i] === level);
  });
  renderTopics();
}

function renderTopics() {
  const topics = state.topics[currentTopicLevel] || [];
  const studentsAtLevel = state.students.filter(s => s.level === currentTopicLevel);
  const el = document.getElementById('topics-list');
  if (topics.length === 0) {
    el.innerHTML = '<div class="empty">Тем ще немає.<br>Додай першу тему для рівня ' + currentTopicLevel + '!</div>';
    return;
  }
  el.innerHTML = '<div class="card">' + topics.map((t, idx) => {
    const doneCount = (t.doneBy||[]).length;
    return `<div class="check-row">
      <div style="font-size:12px;color:var(--text3);min-width:20px;text-align:right">${idx+1}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px">${t.name}</div>
        ${studentsAtLevel.length ? `<div style="font-size:12px;color:var(--text3);margin-top:2px">${doneCount}/${studentsAtLevel.length} учнів пройшли</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${studentsAtLevel.map(s => `
          <div title="${s.name}" onclick="toggleTopicDone('${currentTopicLevel}',${idx},'${s.id}')"
            style="width:28px;height:28px;border-radius:50%;background:${(t.doneBy||[]).includes(s.id)?'var(--accent)':'var(--bg3)'};
            display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:500;
            color:${(t.doneBy||[]).includes(s.id)?'#fff':'var(--text3)'}">
            ${initials(s.name)}
          </div>`).join('')}
        <button class="ghost" style="color:var(--danger);font-size:18px;padding:0 4px" onclick="deleteTopic('${currentTopicLevel}',${idx})">×</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function toggleTopicDone(level, idx, studentId) {
  const t = state.topics[level][idx];
  if (!t.doneBy) t.doneBy = [];
  const pos = t.doneBy.indexOf(studentId);
  if (pos === -1) t.doneBy.push(studentId);
  else t.doneBy.splice(pos, 1);
  save(); renderTopics();
}

function addTopic() {
  const input = document.getElementById('new-topic-input');
  const name = input.value.trim();
  if (!name) return;
  if (!state.topics[currentTopicLevel]) state.topics[currentTopicLevel] = [];
  state.topics[currentTopicLevel].push({ name, doneBy: [] });
  input.value = '';
  save(); renderTopics();
}

function deleteTopic(level, idx) {
  state.topics[level].splice(idx, 1);
  save(); renderTopics();
}

// ── PAYMENTS ─────────────────────────────────────────────
function renderPayments() {
  const monthStart = new Date(); monthStart.setDate(1);
  let paid = 0, debt = 0;
  state.payments.forEach(p => {
    if (p.status === 'Оплачено') paid += p.amount||0;
    else debt += p.amount||0;
  });
  document.getElementById('stat-paid').textContent = paid.toLocaleString('uk') + ' ₴';
  document.getElementById('stat-debt').textContent = debt.toLocaleString('uk') + ' ₴';

  const el = document.getElementById('payments-list');
  if (state.payments.length === 0) {
    el.innerHTML = '<div class="empty">Оплат ще немає</div>';
    return;
  }
  const grouped = {};
  state.students.forEach(s => { grouped[s.id] = { name: s.name, payments: [] }; });
  state.payments.forEach(p => {
    if (grouped[p.studentId]) grouped[p.studentId].payments.push(p);
    else grouped['_'] = grouped['_'] || { name: 'Невідомо', payments: [] }, grouped['_'].payments.push(p);
  });
  el.innerHTML = Object.values(grouped).filter(g => g.payments.length > 0).map(g => `
    <div class="section-title">${g.name}</div>
    <div class="card">
      ${g.payments.sort((a,b) => dateToNum(b.date)-dateToNum(a.date)).map(p => `
        <div class="check-row">
          <div style="flex:1">
            <div style="font-weight:500">${(p.amount||0).toLocaleString('uk')} ₴</div>
            <div style="font-size:13px;color:var(--text2)">${p.type||'Разовий'} · ${p.date||''}
              ${p.type==='Абонемент' && p.lessonsLeft !== undefined ? ` · лишилось уроків: ${p.lessonsLeft}` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge ${p.status==='Оплачено'?'badge-green':'badge-warn'}">${p.status}</span>
            ${p.status==='Очікує' ? `<button class="ghost" style="color:var(--accent);font-size:13px" onclick="markPaid('${p.id}')">✓</button>` : ''}
            <button class="ghost" style="color:var(--danger);font-size:18px;padding:0" onclick="deletePayment('${p.id}')">×</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function markPaid(id) {
  const p = state.payments.find(x => x.id === id);
  if (p) { p.status = 'Оплачено'; save(); renderPayments(); }
}
function deletePayment(id) {
  state.payments = state.payments.filter(x => x.id !== id);
  save(); renderPayments();
}

function savePayment() {
  const studentId = document.getElementById('p-student').value;
  const type = getPill('p-type-pills') || 'Разовий';
  const amount = parseInt(document.getElementById('p-amount').value) || 0;
  const date = document.getElementById('p-date').value.trim();
  const status = getPill('p-status-pills') || 'Оплачено';
  const lessonsCount = type === 'Абонемент' ? parseInt(document.getElementById('p-lessons-count').value)||0 : undefined;
  if (!studentId) { alert('Вибери учня'); return; }
  const p = { id: uid(), studentId, type, amount, date, status };
  if (type === 'Абонемент') { p.lessonsTotal = lessonsCount; p.lessonsLeft = lessonsCount; }
  state.payments.push(p);
  save(); closeModal('modal-add-payment'); renderPayments();
  document.getElementById('p-amount').value = '';
  document.getElementById('p-lessons-count').value = '';
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('header-date').textContent = new Date().toLocaleDateString('uk-UA', { weekday: 'long', day: 'numeric', month: 'long' });
renderSchedule();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
